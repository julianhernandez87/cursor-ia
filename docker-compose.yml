version: "3.3"
services:
  postgres:
    image: postgres:16-alpine
    container_name: postgres
    ports:
      - 5432:5432
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: PasswordO1.
      POSTGRES_DB: demo
    volumes:
      - pg_volume:/var/lib/postgresql/data
  backend:
    build: ./backend
    container_name: backend
    depends_on:
      - postgres
    ports:
      - 8080:8080
    environment:
      SPRING_DATASOURCE_URL: "jdbc:postgresql://postgres:5432/demo"
      SPRING_DATASOURCE_USERNAME: demo
      SPRING_DATASOURCE_PASSWORD: "PasswordO1."
      APP_JWT_SECRET: "demo-jwt-secret-key-min-32-characters-long-for-hs256"
      APP_JWT_EXPIRATION_SECONDS: "3600"
  frontend:
    build: ./frontend
    container_name: frontend
    depends_on:
      - backend
    ports:
      - 4200:80
volumes:
  pg_volume:
